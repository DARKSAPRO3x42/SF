<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANN Job Optimization | Soft Computing</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Subtle Animated Background Elements */
        .blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: var(--accent-primary);
            animation: move 20s infinite alternate;
        }

        .blob-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: var(--accent-primary); }
        .blob-2 { width: 350px; height: 350px; bottom: -100px; right: -100px; background: var(--accent-secondary); animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .job-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.25rem;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .job-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
        }

        .job-header {
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 0.75rem;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(0, 0, 0, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 1.25rem;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        .btn-add {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn-add:hover {
            background: rgba(56, 189, 248, 0.1);
            transform: scale(1.02);
        }

        .btn-run {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3);
        }

        .btn-run:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.4);
        }

        .result-box {
            margin-top: 3rem;
            padding: 2rem;
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 20px;
            display: none;
            animation: expand 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes expand {
            from { opacity: 0; max-height: 0; padding: 0; }
            to { opacity: 1; max-height: 1000px; padding: 2rem; }
        }

        .result-box h3 {
            margin-top: 0;
            color: var(--success);
            font-size: 1.25rem;
        }

        ol {
            padding-left: 1.5rem;
            margin-bottom: 0;
        }

        li {
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        li span {
            color: var(--accent-primary);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <h1>Job Queue Optimizer</h1>
        <p class="subtitle">Neural Network based Job Scheduling (ANN)</p>

        <div id="jobInputs"></div>

        <div class="btn-group">
            <button class="btn-add" onclick="addJob()">+ Add Another Job</button>
            <button class="btn-run" onclick="optimizeJobs()">Run Optimization</button>
        </div>

        <div id="results" class="result-box">
            <h3>Optimized Execution Sequence</h3>
            <ol id="scheduleList"></ol>
        </div>
    </div>

    <script>
        let jobCount = 0;

        function addJob() {
            jobCount++;
            const div = document.createElement('div');
            div.className = 'job-card';
            div.innerHTML = `
                <div class="job-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                    Job #${jobCount}
                </div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Processing (ms)</label>
                        <input type="number" id="time_${jobCount}" value="${10 + jobCount * 5}">
                    </div>
                    <div class="input-group">
                        <label>Memory (GB)</label>
                        <input type="number" id="mem_${jobCount}" value="${Math.floor(Math.random() * 8) + 1}">
                    </div>
                    <div class="input-group">
                        <label>Urgency (1-10)</label>
                        <input type="number" id="urgency_${jobCount}" value="${Math.floor(Math.random() * 10) + 1}">
                    </div>
                </div>
            `;
            document.getElementById('jobInputs').appendChild(div);
        }

        async function optimizeJobs() {
            const jobs = [];
            for (let i = 1; i <= jobCount; i++) {
                jobs.push({
                    id: `Job ${i}`,
                    processing_time: parseFloat(document.getElementById(`time_${i}`).value) || 0,
                    memory: parseFloat(document.getElementById(`mem_${i}`).value) || 0,
                    urgency: parseFloat(document.getElementById(`urgency_${i}`).value) || 0
                });
            }

            const btn = document.querySelector('.btn-run');
            const originalText = btn.innerText;
            btn.innerText = "Analyzing...";
            btn.disabled = true;

            try {
                const response = await fetch('/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jobs: jobs })
                });

                const data = await response.json();
                const list = document.getElementById('scheduleList');
                list.innerHTML = '';
                
                data.optimized_schedule.forEach((job, index) => {
                    const li = document.createElement('li');
                    li.style.animation = `fadeIn 0.3s ease-out ${index * 0.1}s both`;
                    li.innerHTML = `<strong>${job.job_id}</strong> — Priority Score: <span>${job.priority_score}</span>`;
                    list.appendChild(li);
                });

                document.getElementById('results').style.display = 'block';
            } catch (err) {
                console.error(err);
                alert("Error connecting to ANN server.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Init
        addJob();
        addJob();
    </script>
</body>

</html>
